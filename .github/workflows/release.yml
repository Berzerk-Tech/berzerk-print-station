name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD intencionalmente omitido: a chave foi
          # gerada sem senha. Setar como "" confunde o Tauri e ele pula a assinatura,
          # gerando só o .exe sem o .sig/.nsis.zip que o updater precisa.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Berzerk Print Station v__VERSION__"
          releaseBody: |
            Auto-update vai pegar essa versão automaticamente nas próximas aberturas do app.

            Para baixar e instalar manualmente, use o `.exe` abaixo.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          # nsis = instalador .exe pro Windows; updater = bundle .nsis.zip + .sig pro auto-update
          args: --bundles nsis,updater
