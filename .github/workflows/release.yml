name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # nsis  = instalador .exe pro Windows
          # updater = bundle .nsis.zip + .sig pro auto-update
          - platform: windows-latest
            args: --bundles nsis,updater
          # ubuntu-22.04 ainda traz libwebkit2gtk-4.1 estável; a 24.04 derrubou
          # libsoup2 e quebra alguns runtimes Tauri 2 em GitHub-hosted runners.
          # appimage = binário standalone que roda em qualquer distro recente.
          - platform: ubuntu-22.04
            args: --bundles appimage,updater
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            libudev-dev \
            build-essential \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          # Cache por plataforma — runners diferentes, artefatos diferentes
          key: ${{ matrix.platform }}

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Build, sign and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # A CLI do Tauri gera chave SEMPRE encriptada (mesmo com --password "")
          # — header "rsign encrypted secret key". Pra descriptografar a chave em
          # tempo de build, Tauri precisa da var de senha SETADA, mesmo que vazia.
          # Sem ela: Tauri pula signing silenciosamente → sem .sig/.nsis.zip →
          # tauri-action loga "Signature not found for the updater JSON".
          # Vale pros dois OS — mesma chave, mesma flag.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Berzerk RFID v__VERSION__"
          releaseBody: |
            Auto-update vai pegar essa versão automaticamente nas próximas aberturas do app.

            **Windows:** baixe o `.exe` e instale.
            **Linux:** baixe o `.AppImage`, `chmod +x` e execute.
          releaseDraft: false
          prerelease: false
          # tauri-action faz o merge do latest.json entre os jobs da matrix,
          # contanto que os dois publiquem na mesma tag.
          includeUpdaterJson: true
          args: ${{ matrix.args }}
